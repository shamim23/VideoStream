# Docker Compose Configuration
# Run the entire video streaming stack with one command:
# docker-compose up --scale backend=3

version: '3.8'

services:
  # Backend API (stateless - can be scaled horizontally)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-backend-${INSTANCE_ID:-1}
    environment:
      - RUST_LOG=info
      - STORAGE_PATH=/app/storage
    volumes:
      - shared-storage:/app/storage
    networks:
      - video-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Frontend (SvelteKit)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-frontend
    environment:
      - PUBLIC_API_BASE_URL=http://localhost:8080/api
      - PORT=3000
    ports:
      - "5173:3000"
    networks:
      - video-network
    depends_on:
      - nginx
    restart: unless-stopped

  # Nginx Load Balancer (demonstrates horizontal scaling)
  nginx:
    image: nginx:alpine
    container_name: video-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-storage:/app/storage:ro
    networks:
      - video-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  shared-storage:
    driver: local

networks:
  video-network:
    driver: bridge
